<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>CSV Import – Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="assets/css/admin.css" />
</head>

<body>

<header class="topbar">
  <h1>CSV Import</h1>
  <div class="user">
    <a href="index.html">← Back to Admin</a>
  </div>
</header>

<div class="content">

  <!-- 🔷 SECTION: BATCH SELECTION -->
  <h2>Step 1: Select Batch</h2>

  <select id="csvBatchSelect">
    <option value="">-- Select Batch --</option>
  </select>

  <p style="font-size:12px;color:#666;">
    Batch selection is mandatory. All records will be linked to this batch.
  </p>

  <hr />

  <!-- 🔷 SECTION: FILE UPLOAD -->
  <h2>Step 2: Upload CSV</h2>

  <input type="file" id="csvFile" accept=".csv" />

  <div style="margin-top:10px;">
    <button id="parseBtn">Parse & Validate</button>
    <button id="uploadBtn">Upload Valid Records</button>
  </div>

  <p id="statusMsg" style="margin-top:10px;font-weight:bold;"></p>

  <hr />

  <!-- 🔷 SECTION: PREVIEW -->
  <h2>Step 3: Preview & Validation</h2>

  <table id="previewTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Type</th>
        <th>Program</th>
        <th>Status / Errors</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <p style="font-size:12px;color:#666;margin-top:10px;">
    🔴 Invalid rows are highlighted. Only valid records will be uploaded.
  </p>

</div>

<script type="module" src="assets/js/csv.js"></script>

</body>
</html>
