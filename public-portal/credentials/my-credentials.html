<!-- =====================================================
     Agile AI University

     Module      : Student & Executive Portal
     Page        : My Credentials

     File        : my-credentials.html
     Version     : 3.0.0
     Status      : ACTIVE

     Governance  : Portal Governance v3.0

     Purpose
     -----------------------------------------------------
     Displays the authenticated user's credential
     portfolio and provides the governed inline
     credential experience.

     This page is the single entry point for
     credential discovery, preview and recognition
     asset access within the Student & Executive
     Portal.

     Architectural Position
     -----------------------------------------------------
     Authentication
          ↓
     Entitlement Resolution
          ↓
     Authorization
          ↓
     Dashboard Gating
          ↓
     Credential Portfolio Experience
          ↓
     Inline Credential Experience

     Governance Rules
     -----------------------------------------------------
     - Credential visibility is determined
       exclusively by resolvePortalEntitlements.js

     - UI must never perform credential filtering

     - UI must never determine authorization state

     - UI must never resolve entitlements

     - Credential rendering consumes resolver
       output only

     - Credential presentation is delegated
       exclusively to credential-renderer.js

     - Credential retrieval is delegated
       exclusively to credential-service.js

     - Recognition assets are rendered only by
       credential-renderer.js

     - This page defines layout only.
       It never owns credential content.

     Future Direction
     -----------------------------------------------------
     Phase 1
      - Credential Portfolio Experience

     Phase 2
      - Inline Credential Experience

     Phase 3
      - Recognition Asset Experience

     Phase 4
      - Credential Sharing Experience

     Dependencies
     -----------------------------------------------------
     site.css
     credentials.css

     header.js
     footer.js

     firebase-init.js

     entitlement.js
     resolvePortalEntitlements.js

     credential-registry.js
     credential-renderer.js
     credential-service.js

     Change History
     -----------------------------------------------------
     v3.0.0

     - Introduced governed Inline Credential
       Experience layout

     - Established stable rendering regions for
       Hero, Credential Information,
       Recognition Assets and Action Bar

     - Replaced placeholder preview content with
       governed structural containers

     - Preserved authentication,
       authorization,
       entitlement resolution,
       credential retrieval,
       renderer ownership and service boundaries

     - No functional behavior changes

     v2.0.0

     - Removed recognition experience placeholder
     - Removed recognition service dependencies
     - Simplified page architecture to focus on
       Credential Portfolio Experience
     - Removed legacy credential action guidance
     - Updated page messaging to align with
       portfolio-based user experience
     - Established credential portfolio as the
       primary portal landing experience
     - Reduced page complexity and improved
       navigation focus
     - Preserved entitlement-driven credential
       visibility model
     - Preserved credential service and renderer
       ownership boundaries

     v1.1.0

     - Introduced Credential Portfolio Experience
     - Added governance clarification
     - Added future-direction roadmap
     - Prepared page for grid-based
       credential card rendering
     - Established foundation for
       credential detail experience

     v1.0.0

     - Initial governed implementation
     - Added architecture governance header

===================================================== -->

<!doctype html>
<html lang="en">

<head>

    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1">

    <title>
        My Credentials | Agile AI University
    </title>

    <link
        rel="stylesheet"
        href="/assets/css/site.css">

    <link
        rel="stylesheet"
        href="/credentials/assets/css/credentials.css">

</head>

<body>

    <div id="site-header"></div>

    <main class="credentials-page">

        <!-- ==========================================
             Page Header
        =========================================== -->

        <section class="page-header">

            <h1>My Credentials</h1>

            <p>
                Explore and manage your Agile AI
                University credential portfolio.
            </p>

        </section>

        <!-- ==========================================
             Credential Portfolio Experience
        =========================================== -->

        <section
            id="credentials-container"
            class="credential-grid"
            aria-live="polite">

            <div class="loading-state">
                Loading credentials...
            </div>

        </section>

        <!-- ==========================================
             Inline Credential Experience

             Governance
             ------------------------------------------
             This section defines the governed layout
             for the inline credential experience.

             The renderer owns all content rendering.

             This page owns layout only.

             The section remains hidden until a
             credential is selected.

             No entitlement decisions occur here.

             No credential retrieval occurs here.

             No authorization decisions occur here.

             Renderer consumes approved credential
             data supplied by credential-service.js.
        =========================================== -->

        <section
            id="credential-preview-container"
            class="credential-preview-container"
            hidden>

            <!-- Hero -->

            <section
                id="credential-hero"
                class="credential-hero">

            </section>

            <!-- Credential Information -->

            <section
                id="credential-information"
                class="credential-information">

            </section>

            <!-- Recognition Assets -->

            <section
                id="recognition-assets"
                class="recognition-assets">

            </section>

            <!-- Action Bar -->

            <section
                id="credential-actions"
                class="credential-actions">

            </section>

        </section>

    </main>

    <div id="site-footer"></div>

    <script>
        window.__AAIU_CONTEXT = "portal";
    </script>

    <!-- Shared Experience -->

    <script src="/assets/js/header.js"></script>

    <script src="/assets/js/footer.js"></script>

    <!-- Firebase SDK -->

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <!-- Authentication Foundation -->

    <script src="/assets/js/firebase-init.js"></script>

    <!-- ==================================================
         ENTITLEMENT RESOLUTION

         RESPONSIBILITIES

         • Retrieve user credentials
         • Retrieve executive entitlements
         • Retrieve user entitlements
         • Publish portal entitlement state
         • Dispatch entitlements:ready event

         GOVERNANCE

         • API Driven
         • No Authorization Decisions
         • No UI Rendering
         • No Credential Filtering

         REQUIRED BY

         • credential-service.js

    ================================================== -->

    <script src="/assets/js/entitlement.js"></script>

    <!-- Portal Resolver -->

    <script src="/assets/js/services/entitlements/resolvePortalEntitlements.js"></script>

    <!-- Credential Experience -->

    <script src="/assets/js/services/credentials/credential-registry.js"></script>

    <script src="/assets/js/services/credentials/credential-renderer.js"></script>

    <script src="/assets/js/services/credentials/credential-service.js"></script>

</body>

</html>
