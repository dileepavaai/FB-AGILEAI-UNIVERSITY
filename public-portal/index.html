<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Agile AI University Portal</title>

  <!-- Shared Design Authority -->
  <link rel="stylesheet" href="/assets/css/site.css" />

  <!-- Portal Module -->
  <link rel="stylesheet" href="/assets/css/portal.css" />
</head>

<body>

  <!-- Shared Header -->
  <div id="site-header"></div>

  <main class="portal-home">

    <section class="portal-hero">

      <div class="portal-content">

        <h1>Student &amp; Executive Portal</h1>

        <p>
          Access assessments, credentials, recognitions,
          reports, and university services.
        </p>

      </div>

    </section>

    <!-- ==================================================
         SIGNED OUT EXPERIENCE
         ================================================== -->
    <section
      id="signedOutUI"
      class="portal-card"
    >

      <h2>Sign In</h2>

      <p id="statusText">
        Sign in to access your university services.
      </p>

      <button
        id="btnGoogle"
        class="btn"
        type="button"
      >
        Sign in with Google
      </button>

      <div class="divider">OR</div>

      <div class="auth-box">

        <input
          id="emailInput"
          type="email"
          placeholder="Enter your email"
          autocomplete="email"
        />

        <button
          id="btnEmailLink"
          class="btn"
          type="button"
        >
          Send Login Link
        </button>

        <p id="emailStatus" class="status-message"></p>

      </div>

    </section>

    <!-- ==================================================
         SIGNED IN EXPERIENCE
         ================================================== -->
    <section
      id="signedInUI"
      class="portal-card"
      hidden
    >

      <h2>Welcome</h2>

      <p class="user-name">
        <strong id="userName"></strong>
      </p>

      <p
        id="userEmail"
        class="user-email"
      ></p>

      <div class="portal-actions">

        <a
          href="/assessment.html"
          class="btn"
        >
          AI + Agile Assessment
        </a>

        <a
          href="/credentials/my-credentials.html"
          class="btn"
        >
          My Credentials
        </a>

      </div>

      <button
        id="btnSignOut"
        class="btn"
        type="button"
      >
        Sign Out
      </button>

      <p class="note">
        You are authenticated within the Agile AI University Portal.
      </p>

    </section>

  </main>

  <!-- Shared Footer -->
  <div id="site-footer"></div>

  <!-- ==================================================
       CONTEXT
       ================================================== -->
  <script>
    window.__AAIU_CONTEXT = "portal";
  </script>

  <!-- ==================================================
       FIREBASE SDK
       ================================================== -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <!-- ==================================================
       PLATFORM SERVICES
       ================================================== -->
  <script src="/assets/js/firebase-init.js"></script>

  <!-- ==================================================
       PORTAL MODULE
       ================================================== -->
  <script src="/assets/js/portal-auth.js"></script>

  <!-- ==================================================
       SHARED DESIGN AUTHORITY
       ================================================== -->
  <script src="/assets/js/header.js"></script>
  <script src="/assets/js/footer.js"></script>

</body>
</html>
