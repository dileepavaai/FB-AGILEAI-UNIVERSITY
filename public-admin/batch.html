<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Batch Management – Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>

<body>

<header class="topbar">
  <h1>Batch Management</h1>
  <a href="index.html">← Back to Admin</a>
</header>

<div class="content">

  <h2>Create Batch</h2>

  <form id="batchForm">
    <input id="batchName" placeholder="Batch Name" required />

    <select id="programCode" required>
      <option value="">Select Program Code</option>
      <option value="AOP">AOP</option>
      <option value="AIPA">AIPA</option>
    </select>

    <select id="batchStatus">
      <option value="active">Active</option>
      <option value="closed">Closed</option>
    </select>

    <button type="submit">Create Batch</button>
  </form>

  <hr />

  <h2>Batch List</h2>

  <table id="batchTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Program</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script type="module" src="assets/js/batch.js"></script>

</body>
</html>
