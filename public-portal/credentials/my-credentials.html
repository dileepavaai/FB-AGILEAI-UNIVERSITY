<!-- =====================================================
     Agile AI University

     Module      : Student & Executive Portal
     Page        : My Credentials

     File        : my-credentials.html
     Version     : 2.0.0
     Status      : ACTIVE

     Governance  : Portal Governance v2.0

     Purpose
     -----------------------------------------------------
     Displays credential portfolio information
     available to authenticated and authorized
     portal users.

     This page serves as the primary entry
     point into the learner credential
     portfolio experience.

     Architectural Position
     -----------------------------------------------------
     Authentication
          ↓
     Entitlement Resolution
          ↓
     Authorization
          ↓
     Dashboard Gating
          ↓
     Credential Portfolio Experience

     Governance Rules
     -----------------------------------------------------
     - Credential visibility is determined
       exclusively by resolvePortalEntitlements.js

     - UI must never perform credential filtering

     - UI must never determine authorization state

     - UI must never resolve entitlements

     - Credential rendering consumes resolver
       output only

     - Credential presentation is delegated
       to credential-renderer.js

     - Credential retrieval is delegated
       to credential-service.js

     Future Direction
     -----------------------------------------------------
     Phase 1
      - Credential Portfolio Experience

     Phase 2
      - Credential Preview Experience

     Phase 3
      - Verification Experience

     Phase 4
      - Credential Sharing Experience

     Dependencies
     -----------------------------------------------------
     site.css
     credentials.css

     header.js
     footer.js

     firebase-init.js

     entitlement.js
     resolvePortalEntitlements.js

     credential-registry.js
     credential-renderer.js
     credential-service.js

     recognition-registry.js
     recognition-renderer.js
     recognition-service.js

     Change History
     -----------------------------------------------------
      v2.0.0

      - Removed recognition experience placeholder
      - Removed recognition service dependencies
      - Simplified page architecture to focus on
      Credential Portfolio Experience
      - Removed legacy credential action guidance
      - Updated page messaging to align with
      portfolio-based user experience
      - Established credential portfolio as the
      primary portal landing experience
      - Reduced page complexity and improved
      navigation focus
      - Preserved entitlement-driven credential
      visibility model
      - Preserved credential service and renderer
      ownership boundaries
      - No changes to authentication,
      authorization, entitlement resolution,
      credential retrieval, or credential rendering

     v1.1.0
    
     - Introduced Credential Portfolio Experience
     - Added governance clarification
     - Added future-direction roadmap
     - Prepared page for grid-based
       credential card rendering
     - Established foundation for
       credential detail experience

     v1.0.0
     - Initial governed implementation
     - Added architecture governance header

===================================================== -->

<!doctype html>
<html lang="en">

<head>

  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width,initial-scale=1">

  <title>
    My Credentials | Agile AI University
  </title>

  <link
    rel="stylesheet"
    href="/assets/css/site.css">

  <link
    rel="stylesheet"
    href="/credentials/assets/css/credentials.css">

</head>

<body>

  <div id="site-header"></div>

  <main class="credentials-page">

    <section class="page-header">

      <h1>My Credentials</h1>

      <p>
        Explore and manage your Agile AI
        University credential portfolio.
      </p>

    </section>

    <section id="credentials-container" class="credential-grid">

      <div class="loading-state">
        Loading credentials...
      </div>

    </section>

  </main>

  <div id="site-footer"></div>

  <script>
    window.__AAIU_CONTEXT = "portal";
  </script>

  <!-- Shared Experience -->

  <script src="/assets/js/header.js"></script>
  <script src="/assets/js/footer.js"></script>

  <!-- Firebase SDK -->

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <!-- Authentication Foundation -->

  <script src="/assets/js/firebase-init.js"></script>

  <!-- ==================================================
     ENTITLEMENT RESOLUTION

     RESPONSIBILITIES

     • Retrieve user credentials
     • Retrieve executive entitlements
     • Retrieve user entitlements
     • Publish portal entitlement state
     • Dispatch entitlements:ready event

     GOVERNANCE

     • API Driven
     • No Authorization Decisions
     • No UI Rendering
     • No Credential Filtering

     REQUIRED BY

     • credential-service.js

     credential-service.js consumes the
     entitlement payload published by
     entitlement.js and waits for the
     entitlements:ready event before
     invoking the resolver.

     ================================================== -->

  <script src="/assets/js/entitlement.js"></script>

  <!-- Portal Resolver -->

  <script src="/assets/js/services/entitlements/resolvePortalEntitlements.js"></script>

  <!-- Credential Experience -->

  <script src="/assets/js/services/credentials/credential-registry.js"></script>

  <script src="/assets/js/services/credentials/credential-renderer.js"></script>

  <script src="/assets/js/services/credentials/credential-service.js"></script>

</body>

</html>
