     • Credential Workspace access

     Governance Rules
     ----------------------------------------------------------
     • Firebase Authentication remains the identity
       authority.

     • PortalAuth remains the public portal authentication
       facade.

     • PortalSessionService remains the explicit sign-out
       authority.

     • Credential visibility is determined exclusively by
       resolvePortalEntitlements.js.

     • This page must never query Firestore directly.

     • This page must never query Cloud Storage directly.

     • This page must never perform credential filtering.

     • This page must never determine authorization state.

     • This page must never resolve entitlement rules.

     • Credential retrieval is delegated exclusively to
       credential-service.js.

     • Credential presentation is delegated exclusively to
       credential-renderer.js.

     • Credential selection is delegated exclusively to
       credential-detail-actions.js.

     • Credential Workspace rendering is delegated
       exclusively to credential-detail-overlay.js.

     • Credential asset resolution is delegated
       exclusively to credential-asset-service.js.

     • Credential preview is delegated exclusively to
       credential-asset-preview.js.

     • Admin Portal writes and publishes credential assets.

     • Student Portal consumes published assets only.

     • Shared portal components remain authoritative for
       sidebar, toolbar and footer presentation.

     • My Credentials remains the learner-facing navigation
       and page name.

     • Credential Portfolio remains the complete
       professional portfolio experience.

     • Credential Workspace remains the only detailed
       credential experience.

     • The Credential Workspace remains overlay-first.

     • This page owns layout and dependency composition only.

     Naming Standard
     ----------------------------------------------------------
     Navigation Label
     • My Credentials

     Page Experience
     • Credential Portfolio

     Individual Credential Experience
     • Credential Workspace

<body data-page="my-credentials">

    <div class="portal-shell">


        <!-- ==================================================
             PORTAL SIDEBAR

             sidebar.js renders the centralized authenticated
             portal navigation into this mount.

             data-page="my-credentials" identifies the active
             navigation item.
        ================================================== -->

        <aside
            id="portal-sidebar"
            class="portal-sidebar">
        </aside>


        <!-- ==================================================
             PORTAL CONTENT SHELL
        ================================================== -->

        <section class="portal-content-shell">


            <!-- ==============================================
                 PORTAL TOOLBAR

                 toolbar.js renders breadcrumb, page title and
                 authenticated learner account control.
            =============================================== -->

            <header
                id="portal-toolbar"
                class="portal-toolbar">
            </header>


            <!-- ==============================================
                 MY CREDENTIALS PAGE
            =============================================== -->

            <main
                id="main-content"
                class="portal-home credentials-page">

                <div class="portal-page">


                    <!-- ======================================
                         PAGE HEADER
                    ======================================= -->

                    <header class="page-header">

                        <p class="page-eyebrow">
                            Professional Portfolio
                        </p>

                        <h1>
                            My Credentials
                        </h1>

                        <p class="page-description">

                            Access your Agile AI University
                            credentials, official assets,
                            learning resources and professional
                            achievements.

                        </p>

                    </header>


                    <!-- ======================================
                         ACCESSIBLE PAGE STATUS

                         This provides a stable status region
                         for authentication or credential
                         service messages without duplicating
                         credential rendering responsibilities.
                    ======================================= -->

                    <div
                        id="credentialPageStatus"
                        class="credential-page-status"
                        role="status"
                        aria-live="polite"
                        aria-atomic="true">
                    </div>


                    <!-- ======================================
                         AUTHENTICATED CREDENTIAL EXPERIENCE

                         Credential cards are rendered
                         exclusively by credential-renderer.js.

                         Credential visibility is resolved
                         before rendering.

                         This region performs no retrieval,
                         filtering, authorization or
                         entitlement resolution.
                    ======================================= -->

                    <section
                        id="signedInUI"
                        hidden
                        aria-hidden="true">

                        <section
                            class="credential-portfolio-section"
                            aria-labelledby="credential-portfolio-heading">

                            <div class="credential-portfolio-heading">

                                <h2 id="credential-portfolio-heading">
                                    Credential Portfolio
                                </h2>

                                <p>

                                    Select a credential to open
                                    its professional workspace.

                                </p>

                            </div>


                            <!-- ==============================
                                 CREDENTIAL RENDERING MOUNT

                                 Do not rename this ID.

                                 credential-renderer.js and
                                 credential-service.js depend on
                                 this governed presentation
                                 region.
                            =============================== -->

                            <section
                                id="credentials-container"
                                class="credential-grid"
                                aria-live="polite"
                                aria-busy="true">

                                <div
                                    class="loading-state"
                                    role="status">

                                    <span
                                        class="loading-state-indicator"
                                        aria-hidden="true">
                                    </span>

                                    <span>

                                        Loading your credential
                                        portfolio...

                                    </span>

                                </div>

                            </section>

                        </section>

                    </section>


                    <!-- ======================================
                         SIGNED-OUT FALLBACK

                         PortalAuth remains responsible for
                         redirecting unauthenticated users to
                         the governed portal login page.
                    ======================================= -->

                    <section
                        id="signedOutUI"
                        hidden
                        aria-hidden="true">
                    </section>

                </div>

            </main>


            <!-- ==============================================
                 INSTITUTIONAL PORTAL FOOTER

                 The footer remains inside
                 .portal-content-shell so it aligns only with
                 portal content and does not extend beneath the
                 fixed sidebar.
            =============================================== -->

            <div id="site-footer"></div>

        </section>

    </div>


    <!-- ==================================================
         PORTAL CONTEXT
    ================================================== -->

    <script>

        window.__AAIU_CONTEXT =
            "portal";

        window.__AAIU_PAGE =
            "my-credentials";

        window.__AAIU_EXPERIENCE =
            "credential-portfolio";

        window.__AAIU_PORTAL_LOGIN_URL__ =
            "/login.html";

    </script>

         Firestore remains required by governed service-layer

    </script>

         CREDENTIAL WORKSPACE OVERLAY

         for credential information, official assets,
         verification, recognition and future learning
         resources.
    ================================================== -->

    <script
        src="/assets/js/components/credential-detail/credential-detail-overlay.js">
    </script>

        src="/assets/js/services/credentials/credential-renderer.js">
    </script>

        src="/assets/js/services/credentials/credential-service.js">
    </script>


    <!-- ==================================================
         NOSCRIPT FALLBACK
    ================================================== -->

    <noscript>

        <section class="credential-noscript">

            <h1>
                JavaScript is required
            </h1>

            <p>

                JavaScript must be enabled to access your
                Agile AI University credential portfolio.

            </p>

            <p>

                Enable JavaScript in your browser and reload
                this page.

            </p>

        </section>

    </noscript>

</body>

</html>
