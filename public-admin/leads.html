<section id="appView" class="hidden">

  <!-- 🧠 HEADER -->
  <div class="leads-header section">
    <h2>Lead Intelligence</h2>
    <p>Capture, qualify, and convert leads</p>
  </div>

  <!-- 📊 METRICS -->
  <div class="leads-metrics section">
    <div class="leads-metric">
      <span class="value" id="mTotal">0</span>
      <span class="label">Total</span>
    </div>
    <div class="leads-metric">
      <span class="value" id="mEngaged">0</span>
      <span class="label">Engaged</span>
    </div>
    <div class="leads-metric">
      <span class="value" id="mQualified">0</span>
      <span class="label">Qualified</span>
    </div>
    <div class="leads-metric">
      <span class="value" id="mConverted">0</span>
      <span class="label">Converted</span>
    </div>
    <div class="leads-metric">
      <span class="value" id="mConvRate">0%</span>
      <span class="label">Conv %</span>
    </div>
    <div class="leads-metric">
      <span class="value" id="mQualConvRate">0%</span>
      <span class="label">Qual → Conv</span>
    </div>
  </div>

  <!-- 🧾 FORM -->
  <div class="leads-form-card">

    <div class="leads-form-title">Add Lead</div>

    <form id="leadForm" class="leads-form-grid" onsubmit="return false;">

      <div>
        <label>Name *</label>
        <input id="leadName" />
      </div>

      <div>
        <label>Role</label>
        <input id="leadRole" />
      </div>

      <div>
        <label>Company</label>
        <input id="leadCompany" />
      </div>

      <div>
        <label>Location</label>
        <input id="leadLocation" />
      </div>

      <div>
        <label>Email</label>
        <input id="leadEmail" />
      </div>

      <div>
        <label>Phone</label>
        <input id="leadPhone" />
      </div>

      <div class="full">
        <label>LinkedIn URL *</label>
        <input id="leadLinkedIn" />
      </div>

      <div>
        <label>Source</label>
        <select id="leadSource"></select>
      </div>

      <div>
        <label>Experience</label>
        <input id="leadExperience" />
      </div>

      <div>
        <label>Last Contact</label>
        <input type="date" id="leadLastContactDate" />
      </div>

      <div class="full">
        <label>Source Detail</label>
        <input id="leadSourceDetail" />
      </div>

    </form>

    <div class="leads-actions">
      <button class="btn btn-primary" onclick="addLead()">+ Add Lead</button>
      <button class="btn btn-secondary" onclick="clearLeadForm()">Clear</button>
    </div>

  </div>

  <!-- 🔍 FILTERS -->
  <div class="leads-filters">

    <input class="leads-search" placeholder="Search leads..." oninput="applyLeadSearch(this.value)" />

    <select id="leadFilter" onchange="renderLeads()">
      <option value="all">All</option>
      <option value="priority">Priority</option>
      <option value="blocked">Blocked</option>
    </select>

    <select id="leadUserFilter" onchange="renderLeads()">
      <option value="all">All Users</option>
      <option value="mine">My Leads</option>
    </select>

    <button class="leads-tab" onclick="quickFilter('high')">High</button>
    <button class="leads-tab" onclick="quickFilter('converted')">Converted</button>
    <button class="leads-tab" onclick="quickFilter('mine')">My Leads</button>

  </div>

  <!-- 📊 TABLE -->
  <div class="card">

    <div class="card-title">Lead List</div>

    <div class="table-wrapper">
      <table class="table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Role</th>
            <th>Company</th>
            <th>Source</th>
            <th>Owner</th>
            <th>Contact</th>
            <th>Score</th>
            <th>Status</th>
            <th>Stage</th>
            <th>Next Action</th>
            <th>Notes</th>
            <th>Flag</th>
          </tr>
        </thead>
        <tbody id="leadBody"></tbody>
      </table>
    </div>

  </div>

</section>
