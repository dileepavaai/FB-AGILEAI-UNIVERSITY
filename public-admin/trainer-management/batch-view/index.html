<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Trainer Batch View</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- 🔒 BASE -->
  <link rel="stylesheet" href="../assets/css/admin.css" />

  <!-- 🎨 DESIGN SYSTEM -->
  <link rel="stylesheet" href="../shared/design-authority/css/refinement.css" />

  <!-- 🧩 COMMON -->
  <link rel="stylesheet" href="../shared/design-authority/css/surfaces/common/common.css" />
  <link rel="stylesheet" href="../shared/design-authority/css/surfaces/common/tables.css" />
  <link rel="stylesheet" href="../shared/design-authority/css/surfaces/common/micro-interactions.css" />
  <link rel="stylesheet" href="../shared/design-authority/css/surfaces/common/typography.css" />
</head>

<body class="app-loading">

<div id="headerContainer"></div>

<div class="layout">

  <nav class="sidebar" id="adminNav" style="display:none;">
    <ul>
      <li><a href="trainer-dashboard.html">Dashboard</a></li>
      <li><a href="trainer-batches.html" class="active">My Batches</a></li>
    </ul>
  </nav>

  <main class="content">

    <!-- 🔐 LOGIN -->
    <section id="loginView">
      <h2>Trainer Access</h2>
      <button id="loginBtn" class="btn btn-primary">Sign in</button>
    </section>

    <!-- 🔷 APP -->
    <section id="appView" class="hidden">

      <!-- 🧠 HEADER -->
      <div class="section">
        <h2 id="batchTitle">Loading Batch...</h2>
        <p class="page-subtitle">Update learner progress (controlled action)</p>
      </div>

      <!-- 👥 LEARNERS -->
      <div class="card section">

        <div class="card-title">Learners</div>

        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Status</th>
                <th>Update</th>
              </tr>
            </thead>

            <tbody id="trainerLearnerTable">
              <tr>
                <td colspan="4">Loading learners...</td>
              </tr>
            </tbody>

          </table>
        </div>

        <!-- ⚠️ GUIDANCE -->
        <p class="page-subtitle" style="margin-top:10px;">
          Only update status based on actual learner progress. Changes are recorded.
        </p>

      </div>

    </section>

  </main>
</div>

<div id="footerContainer"></div>

<!-- 🔥 ADMIN SYSTEM -->
<script type="module">
import { initAdminApp } from "../assets/js/admin-app.js";

/* ✅ CRITICAL FIX: CONNECT DATA */
initAdminApp("trainer-batch.js");
</script>

</body>
</html>
