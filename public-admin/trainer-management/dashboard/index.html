<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Trainer Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- 🔒 BASE -->
  <link rel="stylesheet" href="../assets/css/admin.css" />

  <!-- 🎨 DESIGN SYSTEM -->
  <link rel="stylesheet" href="../shared/design-authority/css/refinement.css" />

  <!-- 🧩 COMMON -->
  <link rel="stylesheet" href="../shared/design-authority/css/surfaces/common/common.css" />
  <link rel="stylesheet" href="../shared/design-authority/css/surfaces/common/tables.css" />
  <link rel="stylesheet" href="../shared/design-authority/css/surfaces/common/micro-interactions.css" />
  <link rel="stylesheet" href="../shared/design-authority/css/surfaces/common/typography.css" />

  <!-- 🎯 OPTIONAL (future) -->
  <!-- <link rel="stylesheet" href="../shared/design-authority/css/surfaces/trainer.css" /> -->

</head>

<body class="app-loading">

<div id="headerContainer"></div>

<div class="layout">

  <!-- 🔷 TRAINER SIDEBAR -->
  <nav class="sidebar" id="adminNav" style="display:none;">
    <ul>
      <li><a href="trainer-dashboard.html" class="active">Dashboard</a></li>
      <li><a href="trainer-batches.html">My Batches</a></li>
    </ul>
  </nav>

  <main class="content">

    <!-- 🔐 LOGIN -->
    <section id="loginView">
      <h2>Trainer Access</h2>
      <p>Please sign in with your authorized account.</p>
      <button id="loginBtn" class="btn btn-primary">Sign in with Google</button>
    </section>

    <!-- 🔷 APP -->
    <section id="appView" class="hidden">

      <!-- 🧠 HEADER -->
      <div class="section">
        <h2>Trainer Dashboard</h2>
        <p class="page-subtitle">Overview of assigned batches and learners</p>
      </div>

      <!-- 📊 METRICS -->
      <div class="metrics section">
        <div class="metric-card">
          <div class="metric-label">Assigned Batches</div>
          <div class="metric-value" id="tBatches">—</div>
        </div>

        <div class="metric-card">
          <div class="metric-label">Learners</div>
          <div class="metric-value" id="tLearners">—</div>
        </div>

        <div class="metric-card">
          <div class="metric-label">Active</div>
          <div class="metric-value" id="tActive">—</div>
        </div>

        <div class="metric-card">
          <div class="metric-label">Completed</div>
          <div class="metric-value" id="tCompleted">—</div>
        </div>
      </div>

      <!-- 📦 BATCH LIST -->
      <div class="card section">
        <div class="card-title">My Batches</div>

        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th>Batch</th>
                <th>Program</th>
                <th>Status</th>
                <th>Learners</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="trainerBatchTable">
              <tr>
                <td colspan="5">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>

    </section>

  </main>
</div>

<div id="footerContainer"></div>

<!-- 🔥 ADMIN SYSTEM -->
<script type="module">
import { initAdminApp } from "../assets/js/admin-app.js";

/* ✅ CONNECTED TO DATA LAYER */
initAdminApp("trainer-dashboard.js");
</script>

</body>
</html>
