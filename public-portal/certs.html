<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Credentials - Agile AI University</title>

  <link rel="stylesheet" href="/assets/css/site.css" />

  <style>
    body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; color:#222; }
    main { padding:40px; max-width:1000px; margin:auto; }

    h1 { font-size:34px; margin-bottom:20px; }

    .card {
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:20px;
      margin-bottom:20px;
      background:#fff;
    }

    .program {
      font-size:18px;
      font-weight:600;
      margin-bottom:10px;
    }

    .meta {
      color:#666;
      font-size:14px;
      margin-bottom:15px;
    }

    .actions {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn {
      display:inline-block;
      padding:8px 14px;
      border-radius:8px;
      font-size:14px;
      text-decoration:none;
      color:#fff;
      font-weight:500;
    }

    .view { background:#2563eb; }
    .download { background:#059669; }
    .verify { background:#7c3aed; }

    .empty {
      color:#777;
      margin-top:40px;
      text-align:center;
    }
  </style>
</head>

<body>

<div id="site-header"></div>

<main>

  <h1>My Credentials</h1>

  <div id="credentialsContainer"></div>

  <div id="emptyState" class="empty" style="display:none;">
    No credentials found.
  </div>

</main>

<div id="site-footer"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCti7ubJjnU8LJTghNaXhaSZzqCpozkeXg",
    authDomain: "fb-agileai-university.firebaseapp.com",
    projectId: "fb-agileai-university",
    storageBucket: "fb-agileai-university.appspot.com",
    messagingSenderId: "458881040066",
    appId: "1:458881040066:web:c832c420f9b4282e76c55b"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  function normalizeProgram(code) {
    if (code === "AOP") return "AIPA";
    return code;
  }

  function getProgramName(code) {
    if (code === "AIPA") return "Artificial Intelligence Professional Agilist (AIPA)";
    if (code === "AIAA") return "AI Agentic Agilist (AIAA)";
    return code;
  }

  function renderCredential(data) {
    const program = normalizeProgram(data.program_code || "");
    const programName = getProgramName(program);
    const credentialId = data.credential_id;

    const certUrl = `https://certs.agileai.university/${credentialId}`;
    const verifyUrl = `https://verify.agileai.university/?id=${credentialId}`;

    return `
      <div class="card">
        <div class="program">${programName}</div>
        <div class="meta">
          Credential ID: <strong>${credentialId}</strong>
        </div>

        <div class="actions">
          <a href="${certUrl}" target="_blank" class="btn view">View</a>
          <a href="${certUrl}" target="_blank" class="btn download">Download</a>
          <a href="${verifyUrl}" target="_blank" class="btn verify">Verify</a>
        </div>
      </div>
    `;
  }

  auth.onAuthStateChanged(async (user) => {
    if (!user) {
      window.location.href = "/";
      return;
    }

    console.log("Logged in user:", user.email);

    const container = document.getElementById("credentialsContainer");
    const emptyState = document.getElementById("emptyState");

    try {
      const snapshot = await db.collection("credentials")
        .where("email", "==", user.email)
        .get();

      console.log("Documents found:", snapshot.size);

      let html = "";

      snapshot.forEach(doc => {
        const data = doc.data();

        console.log("Credential:", data);

        if (data.issued_status !== "finalized") return;

        html += renderCredential(data);
      });

      if (!html) {
        emptyState.style.display = "block";
        return;
      }

      container.innerHTML = html;

    } catch (err) {
      console.error("Error loading credentials:", err);
      emptyState.style.display = "block";
    }
  });
</script>

<script>
  window.__AAIU_CONTEXT = "portal";
</script>

<script src="/assets/js/header.js"></script>
<script src="/assets/js/footer.js"></script>

</body>
</html>
