site_name: Agile AI Specification
site_description: Agile AI Specification is the canonical framework defining academic structures, capability standards, and professional recognition models for Agile AI systems.
site_author: Agile AI University
site_url: https://spec.agileai.university

docs_dir: agileai-spec
site_dir: public-spec

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - content.code.copy
    - content.action.edit
    - search.highlight
    - search.suggest
    - announcement.dismiss
  analytics:
    provider: google
    property: G-L6Q5J3S1YY

plugins:
  - search

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - admonition
  - attr_list
  - def_list
  - footnotes
  - pymdownx.superfences

extra:
  announcement: "Agile AI Specification is part of the Agile AI University Knowledge Framework"

  meta:
    - property: og:title
      content: Agile AI Specification
    - property: og:description
      content: Agile AI Specification is the canonical framework defining academic structures, capability standards, and professional recognition models for Agile AI systems.
    - property: og:type
      content: website
    - property: og:url
      content: https://spec.agileai.university
    - property: og:image
      content: https://spec.agileai.university/assets/images/og-image.png
    - property: og:image:width
      content: "1200"
    - property: og:image:height
      content: "630"

extra_css:
  - assets/css/site.css

extra_javascript:
  - assets/js/site.js

edit_uri: edit/main/agileai-spec/

nav:

  - Home: index.md

  - Specification:
      - Agile AI Specification v1.0: versions/v1.0/Agile-AI-Specification.md

  - Architecture:
      - Operating Model: architecture/Agile-AI-Operating-Model.md
      - Ecosystem Architecture: architecture/Agile-AI-Ecosystem-Architecture-Map.md

  - Domain:
      - Core Framework: domain/Agile-AI-Core-Framework.md
      - Capability Model: domain/Agile-AI-Capability-Model.md
      - Domain Definition: domain/Agile-AI-Domain-Definition.md
      - Glossary: domain/Agile-AI-Glossary.md
      - History: domain/Agile-AI-History-and-Evolution.md
      - Research Directions: domain/Agile-AI-Research-Directions.md

  - Ecosystem:
      - Principles: ecosystem/Agile-AI-Ecosystem-Principles.md
      - System Context: ecosystem/Agile-AI-Ecosystem-System-Context.md

  - Registries:
      - Capability Registry: registry/capabilities/Agile-AI-Capability-Registry.md
      - Concept Registry: registry/concepts/Agile-AI-Concept-Registry.md
      - Credential Registry: registry/credentials/Agile-AI-Credential-Registry.md
      - Program Registry: registry/programs/Agile-AI-Program-Registry.md

  - Standards:
      - Design Authority Charter: standards/Design-Authority-Charter.md

  - Reference:
      - Reference Library: reference/index.md

  - Publications:
      - Publications: publications/index.md

  - Governance Log:
      - Ecosystem Governance Log: version-log/ecosystem-governance-log.md

copyright: |
  © Agile AI University
  Agile AI Specification v1.0