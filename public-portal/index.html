<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portal - Agile AI University</title>

  <link rel="stylesheet" href="/assets/css/site.css" />

  <style>
    body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; color:#222; }
    main { padding:40px; }
    h1 { font-size:40px; margin:0 0 20px; }

    .btn {
      display:inline-block;
      background:#2f80ed;
      color:white;
      padding:10px 14px;
      border-radius:8px;
      border:none;
      cursor:pointer;
      font-weight:600;
      text-decoration:none;
    }

    .btn.gray { background:#6b7280; }
    .btn.green { background:#10b981; }

    .auth-box {
      margin-top:20px;
      max-width:400px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    input {
      padding:10px;
      border-radius:6px;
      border:1px solid #ccc;
      font-size:14px;
    }

    .divider {
      margin:20px 0;
      color:#888;
      font-size:14px;
    }

    nav { margin-top:20px; display:flex; gap:12px; flex-wrap:wrap; }
    .note { color:#777; margin-top:22px; font-size:14px;}
  </style>
</head>

<body>

<!-- HEADER -->
<div id="site-header"></div>

<main>

  <h1>Welcome to Agile AI University Portal</h1>

  <!-- SIGNED OUT -->
  <div id="signedOutUI">

    <p id="statusText">Not signed in</p>

    <!-- GOOGLE LOGIN -->
    <button id="btnGoogle" class="btn">Sign in with Google</button>

    <div class="divider">OR</div>

    <!-- EMAIL LOGIN -->
    <div class="auth-box">
      <input id="emailInput" type="email" placeholder="Enter your email" />
      <button id="btnEmailLink" class="btn">Send Login Link</button>
      <p id="emailStatus" style="font-size:13px;color:#666;"></p>
    </div>

  </div>

  <!-- SIGNED IN -->
  <div id="signedInUI" style="display:none;">

    <p><strong id="userName"></strong></p>
    <p id="userEmail" style="color:#555;"></p>

    <button id="btnSignOut" class="btn gray">Sign out</button>

    <nav>
      <a href="/assessment.html" class="btn green">AI + Agile Assessment</a>
      <a href="#" class="btn" style="background:#8b5cf6">My Certificates (coming soon)</a>
    </nav>

    <p class="note">You are signed in to the Agile AI University Portal.</p>

  </div>

</main>

<!-- FOOTER -->
<div id="site-footer"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCti7ubJjnU8LJTghNaXhaSZzqCpozkeXg",
  authDomain: "fb-agileai-university.firebaseapp.com",
  projectId: "fb-agileai-university",
  storageBucket: "fb-agileai-university.appspot.com",
  messagingSenderId: "458881040066",
  appId: "1:458881040066:web:c832c420f9b4282e76c55b"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();


// ===============================
// EMAIL LINK CONFIG
// ===============================
const actionCodeSettings = {
  url: "https://portal.agileai.university",
  handleCodeInApp: true
};


// ===============================
// HANDLE LOGIN STATE
// ===============================
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("signedOutUI").style.display = "none";
    document.getElementById("signedInUI").style.display = "block";

    document.getElementById("userName").textContent = user.displayName || user.email;
    document.getElementById("userEmail").textContent = user.email || '';
  } else {
    document.getElementById("signedOutUI").style.display = "block";
    document.getElementById("signedInUI").style.display = "none";
  }
});


// ===============================
// GOOGLE LOGIN
// ===============================
document.getElementById("btnGoogle").onclick = () => {
  auth.signInWithPopup(provider);
};


// ===============================
// EMAIL LINK LOGIN (SEND)
// ===============================
document.getElementById("btnEmailLink").onclick = async () => {
  const email = document.getElementById("emailInput").value;

  if (!email) {
    alert("Enter email");
    return;
  }

  try {
    await auth.sendSignInLinkToEmail(email, actionCodeSettings);
    localStorage.setItem("emailForSignIn", email);

    document.getElementById("emailStatus").textContent =
      "Login link sent. Check your email.";

  } catch (err) {
    console.error(err);
    document.getElementById("emailStatus").textContent =
      "Error sending email.";
  }
};


// ===============================
// EMAIL LINK LOGIN (COMPLETE)
// ===============================
if (auth.isSignInWithEmailLink(window.location.href)) {
  let email = localStorage.getItem("emailForSignIn");

  if (!email) {
    email = prompt("Confirm your email");
  }

  auth.signInWithEmailLink(email, window.location.href)
    .then(() => {
      localStorage.removeItem("emailForSignIn");
      window.location.href = "/";
    })
    .catch(err => console.error(err));
}


// ===============================
// SIGN OUT
// ===============================
document.getElementById("btnSignOut").onclick = () => auth.signOut();
</script>

<!-- CONTEXT -->
<script>
window.__AAIU_CONTEXT = "portal";
</script>

<!-- HEADER / FOOTER -->
<script src="/assets/js/header.js"></script>
<script src="/assets/js/footer.js"></script>

</body>
</html>
