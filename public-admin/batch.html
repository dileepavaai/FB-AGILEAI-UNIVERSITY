<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Batch Management – Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="assets/css/admin.css" />
</head>

<body class="app-loading">

<!-- 🔷 HEADER (CENTRALIZED) -->
<div id="headerContainer"></div>

<div class="layout">

  <!-- 🔷 SIDEBAR -->
  <nav class="sidebar" id="adminNav" style="display:none;">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="leads.html">Lead Intelligence</a></li>
      <li><a href="batch.html">Batch Management</a></li>
      <li><a href="csv.html">CSV Import</a></li>
      <li><a href="reconciliation.html">Reconciliation</a></li>
    </ul>
  </nav>

  <main class="content">

    <!-- 🔐 LOGIN VIEW -->
    <section id="loginView">
      <h2>Admin Access</h2>
      <p>Please sign in with your authorized account.</p>
      <button id="loginBtn">Sign in with Google</button>
    </section>

    <!-- 🔷 APP VIEW -->
    <section id="appView" class="hidden">

      <h2>Batch Management</h2>

      <!-- ➕ CREATE -->
      <h3>Create Batch</h3>

      <form id="batchForm">
        <input id="batchName" placeholder="Batch Name" required />

        <select id="programCode" required>
          <option value="">Select Program Code</option>
          <option value="AOP">AOP</option>
          <option value="AIPA">AIPA</option>
        </select>

        <select id="batchStatus">
          <option value="active">Active</option>
          <option value="closed">Closed</option>
        </select>

        <button type="submit">Create Batch</button>
      </form>

      <hr />

      <!-- 📊 LIST -->
      <h3>Batch List</h3>

      <table id="batchTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Program</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

    </section>

  </main>
</div>

<!-- 🔷 FOOTER -->
<div id="footerContainer"></div>

<!-- 🔥 UNIVERSAL ADMIN CONTROLLER -->
<script type="module">
import { initAdminApp } from "./assets/js/admin-app.js";

/* 🔥 ONE LINE CONTROLS EVERYTHING */
initAdminApp("./assets/js/batch.js");
</script>

</body>
</html>
