<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <title>Lead Intelligence – Admin</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  />

  <!-- =====================================================
   🔷 LEADS ADMIN PAGE

   Version: v2.1.0
   Type: FULL FILE REPLACEMENT
   Status: CENTRALIZED NAVIGATION ADOPTED

   PURPOSE:
   - Preserve the existing Lead Intelligence functionality
   - Preserve all IDs and JavaScript integration hooks
   - Replace the duplicated sidebar with centralized navigation
   - Make future ADMIN_MENU changes propagate automatically

   NAVIGATION AUTHORITY:
   shared/design-authority/js/admin-menu.js
        ↓
   shared/design-authority/js/admin-sidebar.js
        ↓
   adminSidebarContainer

   SAFE GUARANTEES:
   - All lead form IDs are preserved
   - All metric IDs are preserved
   - The leadBody rendering target is preserved
   - Existing global button handlers are preserved
   - initAdminApp("leads.js") is preserved
   - No Firebase behavior is changed
   - No RBAC behavior is changed
   - No lead-management behavior is changed
===================================================== -->

  <!-- 🔒 CORE SYSTEM -->
  <link
    rel="stylesheet"
    href="assets/css/site.css"
  />

  <!-- 🎨 DESIGN AUTHORITY -->
  <link
    rel="stylesheet"
    href="shared/design-authority/css/refinement.css"
  />

  <!-- 🧩 COMMON SURFACES -->
  <link
    rel="stylesheet"
    href="shared/design-authority/css/surfaces/common/common/common.css"
  />

  <link
    rel="stylesheet"
    href="shared/design-authority/css/surfaces/common/tables.css"
  />

  <link
    rel="stylesheet"
    href="shared/design-authority/css/surfaces/common/typography.css"
  />

  <link
    rel="stylesheet"
    href="shared/design-authority/css/surfaces/common/micro-interactions.css"
  />

  <!-- 🎯 PAGE SURFACE -->
  <link
    rel="stylesheet"
    href="shared/design-authority/css/surfaces/leads.css"
  />
</head>

<body class="app-loading">

  <!-- =====================================================
     🔷 HEADER
     Injected by the existing Admin application bootstrap.
  ====================================================== -->
  <div id="headerContainer"></div>

  <div class="layout">

    <!-- =====================================================
       🔷 CENTRALIZED ADMIN SIDEBAR

       Navigation is generated from:
       shared/design-authority/js/admin-menu.js
    ====================================================== -->
    <div id="adminSidebarContainer"></div>

    <main class="content">

      <!-- =====================================================
         🔐 LOGIN VIEW
      ====================================================== -->
      <section id="loginView">

        <h2>Admin Access</h2>

        <p class="page-subtitle">
          Secure access to lead intelligence system
        </p>

        <button
          id="loginBtn"
          class="btn btn-primary"
          type="button"
        >
          Sign in with Google
        </button>

      </section>

      <!-- =====================================================
         🔷 MAIN APPLICATION
      ====================================================== -->
      <section
        id="appView"
        class="hidden"
      >

        <!-- 🧠 PAGE HEADER -->
        <div class="leads-header section">

          <h2>Lead Intelligence</h2>

          <p>
            Capture, qualify, and convert leads
          </p>

        </div>

        <!-- 📊 METRICS -->
        <div class="leads-metrics section">

          <div class="leads-metric">

            <span
              class="value"
              id="mTotal"
            >
              0
            </span>

            <span class="label">
              Total
            </span>

          </div>

          <div class="leads-metric">

            <span
              class="value"
              id="mEngaged"
            >
              0
            </span>

            <span class="label">
              Engaged
            </span>

          </div>

          <div class="leads-metric">

            <span
              class="value"
              id="mQualified"
            >
              0
            </span>

            <span class="label">
              Qualified
            </span>

          </div>

          <div class="leads-metric">

            <span
              class="value"
              id="mConverted"
            >
              0
            </span>

            <span class="label">
              Converted
            </span>

          </div>

          <div class="leads-metric">

            <span
              class="value"
              id="mConvRate"
            >
              0%
            </span>

            <span class="label">
              Conv %
            </span>

          </div>

          <div class="leads-metric">

            <span
              class="value"
              id="mQualConvRate"
            >
              0%
            </span>

            <span class="label">
              Qual → Conv
            </span>

          </div>

        </div>

        <!-- =====================================================
           🧾 ADD LEAD FORM
        ====================================================== -->
        <div class="leads-form-card">

          <div class="leads-form-title">
            Add Lead
          </div>

          <form
            id="leadForm"
            class="leads-form-grid"
            onsubmit="return false;"
            autocomplete="off"
          >

            <div>

              <label for="leadName">
                Name *
              </label>

              <input id="leadName" />

            </div>

            <div>

              <label for="leadRole">
                Role
              </label>

              <input id="leadRole" />

            </div>

            <div>

              <label for="leadCompany">
                Company
              </label>

              <input id="leadCompany" />

            </div>

            <div>

              <label for="leadLocation">
                Location
              </label>

              <input id="leadLocation" />

            </div>

            <div>

              <label for="leadEmail">
                Email
              </label>

              <input id="leadEmail" />

            </div>

            <div>

              <label for="leadPhone">
                Phone
              </label>

              <input id="leadPhone" />

            </div>

            <div class="full-width">

              <label for="leadLinkedIn">
                LinkedIn URL *
              </label>

              <input id="leadLinkedIn" />

            </div>

            <div>

              <label for="leadSource">
                Source
              </label>

              <select id="leadSource"></select>

            </div>

            <div>

              <label for="leadExperience">
                Experience
              </label>

              <input id="leadExperience" />

            </div>

            <div>

              <label for="leadLastContactDate">
                Last Contact
              </label>

              <input
                type="date"
                id="leadLastContactDate"
              />

            </div>

            <div class="full-width">

              <label for="leadSourceDetail">
                Source Detail
              </label>

              <input id="leadSourceDetail" />

            </div>

          </form>

          <div class="leads-actions">

            <button
              class="btn btn-primary"
              type="button"
              onclick="addLead()"
            >
              + Add Lead
            </button>

            <button
              class="btn btn-secondary"
              type="button"
              onclick="clearLeadForm()"
            >
              Clear
            </button>

          </div>

        </div>

        <!-- =====================================================
           📋 LEAD TABLE

           Rendering remains controlled by leads.js.

           Existing support retained for:
           - Multiple lead rows
           - Expandable rows
           - Lead detail rendering
        ====================================================== -->
        <div class="card">

          <div class="card-title">
            Lead List
          </div>

          <div class="table-wrapper leads-table-enhanced">

            <table
              class="table leads-table"
              data-expandable="true"
            >

              <colgroup>
                <col style="width:60px;">
                <col>
                <col>
                <col>
                <col>
                <col>
                <col>
              </colgroup>

              <thead>

                <tr>
                  <th>💬</th>
                  <th>Name</th>
                  <th>Role</th>
                  <th>Company</th>
                  <th>Source</th>
                  <th>Owner</th>
                  <th>Email</th>
                </tr>

              </thead>

              <!-- 🔥 EXISTING JAVASCRIPT RENDER TARGET -->
              <tbody
                id="leadBody"
                class="lead-body"
              ></tbody>

            </table>

          </div>

        </div>

      </section>

    </main>

  </div>

  <!-- =====================================================
     🔷 FOOTER
     Injected by the existing Admin application bootstrap.
  ====================================================== -->
  <div id="footerContainer"></div>

  <!-- =====================================================
     🔥 ADMIN BOOTSTRAP

     Centralized navigation is rendered first.
     The existing Lead Intelligence module is then initialized.
  ====================================================== -->
  <script type="module">

    import { initAdminApp }
      from "./assets/js/admin-app.js";

    import { loadAdminSidebar }
      from "./shared/design-authority/js/admin-sidebar.js";

    /*
      Render navigation from the centralized ADMIN_MENU authority
      and mark Lead Intelligence as the active Admin surface.
    */

    loadAdminSidebar(
      "lead-intelligence"
    );

    /*
      Preserve the existing Lead Intelligence application module.
    */

    initAdminApp(
      "leads.js"
    );

  </script>

</body>
</html>
