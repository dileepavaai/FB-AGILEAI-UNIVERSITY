<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Batch Management – Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- 🔷 BASE ADMIN CSS (LOCKED) -->
  <link rel="stylesheet" href="assets/css/admin.css" />

  <!-- 🔷 REFINEMENT LAYER -->
  <link rel="stylesheet" href="shared/design-authority/css/refinement.css" />
</head>

<body class="app-loading">

<!-- 🔷 HEADER -->
<div id="headerContainer"></div>

<div class="layout">

  <!-- 🔷 SIDEBAR -->
  <nav class="sidebar" id="adminNav" style="display:none;">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="leads.html">Lead Intelligence</a></li>
      <li><a href="batch.html" class="active">Batch Management</a></li>
      <li><a href="csv.html">CSV Import</a></li>
      <li><a href="reconciliation.html">Reconciliation</a></li>
    </ul>
  </nav>

  <main class="content">

    <!-- 🔐 LOGIN VIEW -->
    <section id="loginView">
      <h2>Admin Access</h2>
      <p>Please sign in with your authorized account.</p>
      <button id="loginBtn">Sign in with Google</button>
    </section>

    <!-- 🔷 APP VIEW -->
    <section id="appView" class="hidden">

      <div class="page-header">
        <h2>Batch Management</h2>
        <p class="page-subtitle">Create and manage program batches</p>
      </div>

      <!-- ➕ CREATE -->
      <div class="card">
        <h3>Create Batch</h3>

        <form id="batchForm" class="lead-form">

          <div class="form-field">
            <label>Batch Name</label>
            <input id="batchName" required />
          </div>

          <div class="form-field">
            <label>Program Code</label>
            <select id="programCode" required>
              <option value="">Select Program Code</option>
              <option value="AOP">AOP</option>
              <option value="AIPA">AIPA</option>
            </select>
          </div>

          <div class="form-field">
            <label>Status</label>
            <select id="batchStatus">
              <option value="active">Active</option>
              <option value="closed">Closed</option>
            </select>
          </div>

          <div class="form-actions">
            <button type="submit">Create Batch</button>
          </div>

        </form>
      </div>

      <!-- 📊 LIST -->
      <div class="card" style="margin-top: 20px;">
        <h3>Batch List</h3>

        <div class="table-wrapper">
          <table id="batchTable">
            <thead>
              <tr>
                <th>Name</th>
                <th>Program</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

    </section>

  </main>
</div>

<!-- 🔷 FOOTER -->
<div id="footerContainer"></div>

<!-- 🔥 UNIVERSAL ADMIN CONTROLLER -->
<script type="module">
import { initAdminApp } from "./assets/js/admin-app.js";
initAdminApp("./assets/js/batch.js");
</script>

<!-- 🔗 NAVIGATION -->
<script>
function openBatch(batchId) {
  window.location.href = `batch-view.html?batch_id=${batchId}`;
}
</script>

</body>
</html>
