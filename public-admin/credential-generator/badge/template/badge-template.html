<div class="badge-template">

    <!-- ===================================== -->
    <!-- Badge Header                          -->
    <!-- ===================================== -->

    <div class="badge-header">

        <img
            src="/credential-generator/assets/images/aau-emblem.png"
            alt="Agile AI University Emblem"
            class="badge-emblem"
        >

    </div>

    <!-- ===================================== -->
    <!-- Badge Body                            -->
    <!-- ===================================== -->

    <div class="badge-body">

        <h1
            id="badgeCredentialCode"
            class="badge-credential-code"
        >
            AIPA
        </h1>

        <div
            id="badgeCredentialTitle"
            class="badge-credential-title"
        >
            Artificial Intelligence<br>
            Professional Agilist
        </div>

        <div class="badge-type">

            Professional Recognition Badge

        </div>

    </div>

    <!-- ===================================== -->
    <!-- Badge Footer                          -->
    <!-- ===================================== -->

    <div class="badge-footer">

        <p class="badge-credential-id">

            <strong>Credential ID:</strong>

            <span id="badgeCredentialId">
                AAU-XXXXXX
            </span>

        </p>

        <p class="badge-verification-url">

            verify.agileai.university

        </p>
