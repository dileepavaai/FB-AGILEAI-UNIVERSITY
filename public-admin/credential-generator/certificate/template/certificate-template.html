<div class="certificate-template">

  <div class="certificate-header">
    <h1>Agile AI University</h1>
    <h2>Certificate of Recognition</h2>
  </div>

  <div class="certificate-body">

    <p>This certifies that</p>

    <h3 id="certLearnerName">
      Learner Name
    </h3>

    <p>has been awarded the credential</p>

    <h3 id="certCredentialType">
      Credential Type
    </h3>

    <p>under the program</p>

    <h3 id="certProgramCode">
      Program Code
    </h3>

  </div>

  <div class="certificate-footer">

    <p>
      Credential ID:
      <span id="certCredentialId"></span>
    </p>

    <p>
      Issue Date:
      <span id="certIssueDate"></span>
    </p>

  </div>

</div>
