<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <title>Audit Logs – Admin</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  />

  <!-- 🔒 BASE -->
  <link
    rel="stylesheet"
    href="assets/css/site.css"
  />

  <!-- 🎨 DESIGN SYSTEM -->
  <link
    rel="stylesheet"
    href="shared/design-authority/css/refinement.css"
  />

  <!-- 🧩 COMMON -->
  <link
    rel="stylesheet"
    href="shared/design-authority/css/surfaces/common/common.css"
  />

  <link
    rel="stylesheet"
    href="shared/design-authority/css/surfaces/common/tables.css"
  />

  <link
    rel="stylesheet"
    href="shared/design-authority/css/surfaces/common/micro-interactions.css"
  />

  <link
    rel="stylesheet"
    href="shared/design-authority/css/surfaces/common/typography.css"
  />
</head>

<body class="app-loading">

  <!-- 🔷 HEADER -->
  <div id="headerContainer"></div>

  <div class="layout">

    <!--
      🔷 CENTRALIZED ADMIN SIDEBAR

      Navigation is generated from:
      shared/design-authority/js/admin-menu.js
    -->
    <div id="adminSidebarContainer"></div>

    <main class="content">

      <!-- 🔐 LOGIN -->
      <section id="loginView">

        <h2>Admin Access</h2>

        <p class="page-subtitle">
          Restricted to authorized administrators
        </p>

        <button
          id="loginBtn"
          class="btn btn-primary"
          type="button"
        >
          Sign in
        </button>

      </section>

      <!-- 🔷 APP -->
      <section
        id="appView"
        class="hidden"
      >

        <!-- 🧠 HEADER -->
        <div class="section">

          <h2>Audit Logs</h2>

          <p class="page-subtitle">
            Immutable history of learner status updates (audit-safe)
          </p>

        </div>

        <!-- 🔍 FILTER BAR -->
        <div class="card section">

          <div class="card-title">
            Filters
          </div>

          <div class="toolbar">

            <select
              id="filter-status"
              onchange="applyAuditFilters()"
            >
              <option value="">
                All Status
              </option>

              <option value="active">
                Active
              </option>

              <option value="completed">
                Completed
              </option>

              <option value="dropped">
                Dropped
              </option>
            </select>

            <input
              id="filter-email"
              type="search"
              placeholder="Search by email"
              oninput="applyAuditFilters()"
            />

            <button
              class="btn btn-secondary"
              type="button"
              onclick="applyAuditFilters()"
            >
              Apply
            </button>

            <button
              class="btn btn-primary"
              type="button"
              onclick="exportAuditCSV()"
            >
              Export CSV
            </button>

          </div>

        </div>

        <!-- 📊 TABLE -->
        <div class="card section">

          <div class="card-title">
            Audit Trail
          </div>

          <div class="table-wrapper">

            <table class="table">

              <thead>
                <tr>
                  <th>Learner</th>
                  <th>Email</th>
                  <th>From</th>
                  <th>To</th>
                  <th>Updated By</th>
                  <th>Time</th>
                </tr>
              </thead>

              <tbody id="auditTable">

                <tr>
                  <td colspan="6">
                    Loading audit logs...
                  </td>
                </tr>

              </tbody>

            </table>

          </div>

        </div>

      </section>

    </main>

  </div>

  <!-- 🔷 FOOTER -->
  <div id="footerContainer"></div>

  <!-- 🔥 ADMIN SYSTEM -->
  <script type="module">

    import { initAdminApp }
      from "./assets/js/admin-app.js";

    import { loadAdminSidebar }
      from "./shared/design-authority/js/admin-sidebar.js";

    /*
      Render navigation from the centralized
      ADMIN_MENU authority and mark Audit Logs active.
    */

    loadAdminSidebar(
      "audit-logs"
    );

    /*
      Preserve the existing Audit Logs module.
    */

    initAdminApp(
      "audit-logs.js"
    );

  </script>

</body>
</html>
