<!-- =====================================================
     Agile AI University

     Module      : Student & Executive Portal
     Page        : My Credentials
     Experience  : Credential Portfolio

     File        : my-credentials.html
     Version     : 3.2.1
     Status      : ACTIVE

     Governance  : Portal Governance v3.0

     Purpose
     -----------------------------------------------------
     Provides the authenticated learner with a governed
     professional portfolio of earned Agile AI University
     credentials.

     The page acts as the learner-facing entry point for:

     • Credential discovery
     • Credential Workspace access
     • Official credential assets
     • Certificate and badge preview
     • Downloads
     • Verification
     • Professional sharing
     • Licensed learning resources
     • Future progression opportunities

     Experience Hierarchy
     -----------------------------------------------------
     Dashboard
          ↓
     My Credentials
          ↓
     Credential Portfolio
          ↓
     Credential Workspace
          ↓
     Official Assets
          ↓
     Licensed Learning Resources
          ↓
     Verification
          ↓
     Professional Sharing
          ↓
     Future Progression

     Architectural Position
     -----------------------------------------------------
     Authentication
          ↓
     Authorization
          ↓
     Entitlement Resolution
          ↓
     Credential Service
          ↓
     Credential Renderer
          ↓
     Credential Detail Actions
          ↓
     Credential Detail Overlay
          ↓
     Credential Assets Section
          ↓
     Credential Asset Service
          ↓
     Credential Asset Preview

     Governance Rules
     -----------------------------------------------------
     • Credential visibility is determined exclusively
       by resolvePortalEntitlements.js.

     • This page must never query Firestore directly.

     • This page must never query Cloud Storage directly.

     • This page must never perform credential filtering.

     • This page must never determine authorization state.

     • This page must never resolve entitlement rules.

     • Credential retrieval is delegated exclusively
       to credential-service.js.

     • Credential presentation is delegated exclusively
       to credential-renderer.js.

     • Credential selection is delegated exclusively
       to credential-detail-actions.js.

     • Credential Workspace rendering is delegated
       exclusively to credential-detail-overlay.js.

     • Credential asset resolution is delegated
       exclusively to credential-asset-service.js.

     • Credential preview is delegated exclusively
       to credential-asset-preview.js.

     • Admin Portal writes and publishes credential assets.

     • Student Portal consumes published assets only.

     • This page owns layout only.

     Naming Standard
     -----------------------------------------------------
     Navigation Label
     • My Credentials

     Page Experience
     • Credential Portfolio

     Individual Credential Experience
     • Credential Workspace

     Dependencies
     -----------------------------------------------------
     Shared UI
     • site.css
     • overlay.css
     • credentials.css
     • credential-preview.css
     • credential-detail-overlay.css
     • credential-asset-preview.css
     • header.js
     • footer.js

     Platform Foundation
     • Firebase App
     • Firebase Auth
     • Firebase Firestore
     • firebase-init.js
     • portal-auth.js
     • portal-authorization.js

     Entitlement Foundation
     • entitlement.js
     • resolvePortalEntitlements.js

     Programme Foundation
     • program-service.js

     Credential Services
     • credential-registry.js
     • credential-validation.js
     • credential-asset-service.js
     • credential-detail-actions.js
     • credential-renderer.js
     • credential-service.js

     Credential Components
     • Credential detail header
     • Credential information section
     • Credential assets section
     • Credential verification section
     • Credential recognition section
     • Credential detail overlay

     Asset Preview Components
     • Certificate preview
     • Trainer certificate preview
     • Badge preview
     • Credential asset preview

     Change History
     -----------------------------------------------------
     v3.2.1

     • Corrected Firebase initialization path to the
       governed authentication foundation directory.

     • Corrected PortalAuth path to the governed
       authentication foundation directory.

     • Aligned Firebase and PortalAuth cache versions
       with the authenticated dashboard.

     v3.2.0

     • Added shared overlay framework styles.

     • Adopted the shared Credential Detail Overlay

     • Adopted the shared Credential Asset Preview
       stylesheet.

     • Added explicit portal authorization dependency.

     • Corrected the Credential Workspace architectural
       flow to include Credential Assets Section.

     • Preserved My Credentials as the learner-facing
       navigation and page name.

     • Preserved Credential Portfolio as the professional
       portfolio experience.

     • Preserved Credential Workspace as the only detailed
       credential experience.

     • Preserved resolver-owned credential visibility.

     • Preserved service-oriented portal architecture.

     v3.1.0

     • Repositioned My Credentials as the learner's
       governed Credential Portfolio.

     • Removed obsolete inline credential preview
       containers.

     • Adopted the shared Credential Detail Overlay
       as the only Credential Workspace.

     • Added Back to Dashboard navigation.

     • Added professional portfolio positioning.

     • Added the complete Credential Workspace
       dependency chain.

     • Prepared the page for licensed learning resources.

     v3.0.0

     • Introduced governed inline credential experience.

     • Established rendering regions for hero,
       credential information, recognition assets
       and actions.

     v2.0.0

     • Introduced Credential Portfolio Experience.

     • Simplified page architecture.

     • Preserved entitlement-driven visibility.

     v1.0.0

     • Initial governed implementation.

===================================================== -->

<!doctype html>

<html lang="en">

<head>

    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1">

    <meta
        name="description"
        content="Access your Agile AI University credentials, official assets, learning resources and professional achievements.">

    <title>
        My Credentials | Agile AI University
    </title>


    <!-- ==================================================
         SHARED PORTAL STYLES
    ================================================== -->

    <link
        rel="stylesheet"
        href="/assets/css/site.css">

    <link
        rel="stylesheet"
        href="/assets/css/components/overlay.css">


    <!-- ==================================================
         CREDENTIAL PORTFOLIO STYLES
    ================================================== -->

    <link
        rel="stylesheet"
        href="/credentials/assets/css/credentials.css">

    <link
        rel="stylesheet"
        href="/credentials/assets/css/credential-preview.css">


    <!-- ==================================================
         CREDENTIAL WORKSPACE STYLES
    ================================================== -->

    <link
        rel="stylesheet"
        href="/assets/css/components/credential-detail/credential-detail-overlay.css">

    <link
        rel="stylesheet"
        href="/assets/css/components/asset-preview/credential-asset-preview.css">

</head>


<body data-page="my-credentials">


    <!-- ==================================================
         SHARED HEADER
    ================================================== -->

    <div id="site-header"></div>


    <!-- ==================================================
         CREDENTIAL PORTFOLIO
    ================================================== -->

    <main
        id="main-content"
        class="credentials-page">


        <!-- ==============================================
             PORTFOLIO NAVIGATION
        =============================================== -->

        <nav
            class="credentials-page-navigation"
            aria-label="Credential portfolio navigation">

            <a
                class="credentials-back-link"
                href="/index.html">

                <span aria-hidden="true">
                    ←
                </span>

                <span>
                    Back to Dashboard
                </span>

            </a>

        </nav>


        <!-- ==============================================
             PAGE HEADER
        =============================================== -->

        <header class="page-header">

            <p class="page-eyebrow">
                Professional Portfolio
            </p>

            <h1>
                My Credentials
            </h1>

            <p class="page-description">

                Access your Agile AI University
                credentials, official assets, learning
                resources and professional achievements.

            </p>

        </header>


        <!-- ==============================================
             CREDENTIAL PORTFOLIO EXPERIENCE

             Governance
             ----------------------------------------------
             Credential cards are rendered exclusively by
             credential-renderer.js.

             Credential visibility is resolved before
             rendering.

             This region must not perform retrieval,
             filtering, authorization or entitlement
             resolution.
        =============================================== -->

        <section
            class="credential-portfolio-section"
            aria-labelledby="credential-portfolio-heading">

            <div class="credential-portfolio-heading">

                <h2 id="credential-portfolio-heading">
                    Credential Portfolio
                </h2>

                <p>
                    Select a credential to open its
                    professional workspace.
                </p>

            </div>


            <section
                id="credentials-container"
                class="credential-grid"
                aria-live="polite"
                aria-busy="true">

                <div
                    class="loading-state"
                    role="status">

                    <span
                        class="loading-state-indicator"
                        aria-hidden="true">
                    </span>

                    <span>
                        Loading your credential portfolio...
                    </span>

                </div>

            </section>

        </section>

    </main>


    <!-- ==================================================
         SHARED FOOTER
    ================================================== -->

    <div id="site-footer"></div>


    <!-- ==================================================
         PORTAL CONTEXT
    ================================================== -->

    <script>

        window.__AAIU_CONTEXT =
            "portal";

        window.__AAIU_PAGE =
            "my-credentials";

        window.__AAIU_EXPERIENCE =
            "credential-portfolio";

    </script>


    <!-- ==================================================
         SHARED PORTAL EXPERIENCE
    ================================================== -->

    <script src="/assets/js/header.js"></script>

    <script src="/assets/js/footer.js"></script>


    <!-- ==================================================
         FIREBASE COMPAT SDK

         Firestore is required by governed service-layer
         consumers such as CredentialAssetService.

         This page itself does not access Firestore.
    ================================================== -->

    <script
        src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
    </script>

    <script
        src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js">
    </script>

    <script
        src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js">
    </script>


    <!-- ==================================================
         AUTHENTICATION FOUNDATION
    ================================================== -->

    <script src="/assets/js/auth/firebase-init.js?v=1.4.0"></script>

    <script src="/assets/js/auth/portal-auth.js?v=2.0.1"></script>


    <!-- ==================================================
         ENTITLEMENT FOUNDATION

         Responsibilities
         ----------------------------------------------
         • Retrieve portal entitlement source data
         • Publish portal entitlement state
         • Dispatch entitlements:ready

         Governance
         ----------------------------------------------
         • No UI rendering
         • No credential presentation
         • No asset presentation
    ================================================== -->

    <script src="/assets/js/entitlement.js"></script>

    <script
        src="/assets/js/services/entitlements/resolvePortalEntitlements.js">
    </script>


    <!-- ==================================================
         AUTHORIZATION

         Authorization remains a platform concern.

         Credential visibility remains owned by the
         entitlement resolver.
    ================================================== -->

    <script
        src="/assets/js/services/authorization/portal-authorization.js">
    </script>


    <!-- ==================================================
         PROGRAMME FOUNDATION

         Required by CredentialService for programme
         metadata enrichment.
    ================================================== -->

    <script
        src="/assets/js/services/programs/program-service.js">
    </script>


    <!-- ==================================================
         CREDENTIAL DOMAIN FOUNDATION
    ================================================== -->

    <script
        src="/assets/js/services/credentials/credential-registry.js">
    </script>

    <script
        src="/assets/js/services/credentials/credential-validation.js">
    </script>

    <script
        src="/assets/js/services/credentials/credential-asset-service.js">
    </script>


    <!-- ==================================================
         ASSET PREVIEW RENDERERS

         Individual renderers load before the shared
         CredentialAssetPreview orchestrator.
    ================================================== -->

    <script
        src="/assets/js/components/asset-preview/renderers/certificate-preview.js">
    </script>

    <script
        src="/assets/js/components/asset-preview/renderers/trainer-certificate-preview.js">
    </script>

    <script
        src="/assets/js/components/asset-preview/renderers/badge-preview.js">
    </script>

    <script
        src="/assets/js/components/asset-preview/credential-asset-preview.js">
    </script>


    <!-- ==================================================
         CREDENTIAL WORKSPACE SECTIONS

         Each component owns only its presentation region.
    ================================================== -->

    <script
        src="/assets/js/components/credential-detail/credential-detail-header.js">
    </script>

    <script
        src="/assets/js/components/credential-detail/credential-information-section.js">
    </script>

    <script
        src="/assets/js/components/credential-detail/credential-assets-section.js">
    </script>

    <script
        src="/assets/js/components/credential-detail/credential-verification-section.js">
    </script>

    <script
        src="/assets/js/components/credential-detail/credential-recognition-section.js">
    </script>


    <!-- ==================================================
         CREDENTIAL WORKSPACE OVERLAY

         The overlay remains the single governed workspace
         for credential information, official assets,
         verification, recognition and future learning
         resources.
    ================================================== -->

    <script
        src="/assets/js/components/credential-detail/credential-detail-overlay.js">
    </script>


    <!-- ==================================================
         CREDENTIAL INTERACTION SERVICES
    ================================================== -->

    <script
        src="/assets/js/services/credentials/credential-detail-actions.js">
    </script>


    <!-- ==================================================
         CREDENTIAL PORTFOLIO

         Renderer must load before CredentialService.

         CredentialService initializes after published
         entitlement readiness.
    ================================================== -->

    <script
        src="/assets/js/services/credentials/credential-renderer.js">
    </script>

    <script
        src="/assets/js/services/credentials/credential-service.js">
    </script>

</body>

</html>
